# ==============================================================================
# AI INTELLIGENCE ZONE — Control Arena
# Nginx Reverse Proxy Configuration (Production)
# ==============================================================================

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────
    log_format arena '$remote_addr - $remote_user [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_referer" "$http_user_agent" '
                     'rt=$request_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log arena;

    # ── Performance ──────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # ── Gzip Compression ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/x-javascript
        image/svg+xml;

    # ── Rate Limiting Zones ──────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=submit_limit:10m rate=10r/m;

    # ── Connection Limiting ──────────────────────────────────────
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream ─────────────────────────────────────────────────
    upstream arena_app {
        server app:5000;
        keepalive 32;
    }

    # ── HTTP → HTTPS Redirect ────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # For local/dev: serve directly
        # For production: uncomment the redirect below and use the SSL server block
        # return 301 https://$host$request_uri;

        location / {
            proxy_pass http://arena_app;
            include /etc/nginx/proxy_params_arena;
        }

        location /socket.io {
            proxy_pass http://arena_app/socket.io;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # Rate-limited endpoints
        location /api/submit {
            limit_req zone=submit_limit burst=5 nodelay;
            limit_conn conn_limit 10;
            proxy_pass http://arena_app;
            include /etc/nginx/proxy_params_arena;
        }

        location /auth/login {
            limit_req zone=login_limit burst=3 nodelay;
            proxy_pass http://arena_app;
            include /etc/nginx/proxy_params_arena;
        }

        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://arena_app;
            include /etc/nginx/proxy_params_arena;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data:;" always;

        # Block common attack paths
        location ~ /\. {
            deny all;
            return 404;
        }

        location ~* \.(git|env|bak|sql|log)$ {
            deny all;
            return 404;
        }
    }

    # ── HTTPS Server (Production) ────────────────────────────────
    # Uncomment this block for SSL in production
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #     ssl_session_tickets off;
    #
    #     # HSTS
    #     add_header Strict-Transport-Security "max-age=63072000" always;
