<!-- ========================================================================
     AI INTELLIGENCE ZONE — Login Page
     ======================================================================== -->
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Intelligence Zone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: #020617;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }

        .login-card {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 0 60px rgba(99, 102, 241, 0.1);
        }

        .login-brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-brand h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: #6366f1;
            letter-spacing: 2px;
        }

        .login-brand p {
            color: #475569;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .form-control {
            background: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            border-radius: 8px;
        }

        .form-control:focus {
            background: #1e293b;
            border-color: #6366f1;
            color: #e2e8f0;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .btn-arena {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            color: white;
            padding: 0.75rem;
            font-weight: 600;
            border-radius: 8px;
            width: 100%;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .btn-arena:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
            color: white;
        }

        .glow-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #6366f1, transparent);
            margin: 1.5rem 0;
            border-radius: 1px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <h1>⚡ AI INTEL ZONE</h1>
                <p>Control Arena</p>
            </div>

            <div class="glow-line"></div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                <div class="alert alert-{{ category }} py-2 px-3" style="font-size: 0.8rem;">{{ message }}</div>
                {% endfor %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="mb-3">
                    <label class="form-label" style="font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px;">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter admin username" required autofocus>
                </div>

                <div class="mb-4">
                    <label class="form-label" style="font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px;">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>

                <button type="submit" class="btn btn-arena">
                    🔐 Authenticate
                </button>
            </form>

            <div class="glow-line"></div>

            <p class="text-center mb-0" style="font-size: 0.7rem; color: #334155;">
                Authorized personnel only. All access is logged.
            </p>
        </div>
    </div>
</body>
</html>
