# ==============================================================================
# AI INTELLIGENCE ZONE — Control Arena
# Docker Compose — Full Production Stack
# ==============================================================================

services:
  # ── Flask Application ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: arena-app
    restart: unless-stopped
    env_file: .env
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://arena:ArenaSecure2026!@postgres:5432/control_arena
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app-logs:/app/logs
      - app-instance:/app/instance
    networks:
      - arena-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── PostgreSQL Database ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: arena-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: control_arena
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: ArenaSecure2026!
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - arena-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arena -d control_arena"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis Cache & Session Store ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: arena-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --protected-mode yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - arena-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── Nginx Reverse Proxy ────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: arena-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    networks:
      - arena-network

  # ── Celery Worker (Async Tasks) ────────────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: arena-celery-worker
    restart: unless-stopped
    env_file: .env
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://arena:ArenaSecure2026!@postgres:5432/control_arena
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    command: ["celery", "-A", "celery_worker.celery", "worker", "--loglevel=info", "--concurrency=4"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app-logs:/app/logs
    networks:
      - arena-network

  # ── Celery Beat (Scheduled Tasks) ──────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: arena-celery-beat
    restart: unless-stopped
    env_file: .env
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://arena:ArenaSecure2026!@postgres:5432/control_arena
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    command: ["celery", "-A", "celery_worker.celery", "beat", "--loglevel=info"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - arena-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  app-logs:
    driver: local
  app-instance:
    driver: local
  nginx-logs:
    driver: local

networks:
  arena-network:
    driver: bridge
    name: arena-network
